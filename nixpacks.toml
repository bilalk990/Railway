[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.openssl", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.json", "php82Extensions.fileinfo", "php82Extensions.bcmath", "nodejs_18"]

[phases.install]
cmds = [
    "mkdir -p /opt/composer",
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/opt/composer",
    "php /opt/composer/composer.phar install --no-dev --optimize-autoloader --no-interaction",
]

[phases.build]
cmds = [
    "php artisan config:clear",
    "php artisan view:clear",
    "php artisan route:clear",
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
